openapi: 3.0.0
info:
  title: Finance Dashboard API
  version: "1.0.0"
  description: Backend API for financial records and user management

servers:
  - url: http://localhost:5000

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:

  /api/auth/login:
    post:
      summary: User login
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  example: admin@gmail.com
                password:
                  type: string
                  example: thisisme@123
      responses:
        200:
          description: Login successful
        401:
          description: Invalid credentials

  /api/users:
    post:
      summary: Create user (Admin only)
      tags: [Users]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password, role]
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, analyst, viewer]
      responses:
        201:
          description: User created

  /api/users/{id}:
    patch:
      summary: Update user (Admin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                email:
                  type: string
                password:
                  type: string
                role:
                  type: string
                  enum: [admin, analyst, viewer]
                status:
                  type: string
                  enum: [active, inactive]
      responses:
        200:
          description: User updated

    delete:
      summary: Deactivate user (Admin only)
      tags: [Users]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: User deactivated

  /api/records:
    post:
      summary: Create financial record (Admin only)
      tags: [Records]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [amount, type, category, transaction_date]
              properties:
                amount:
                  type: number
                type:
                  type: string
                  enum: [income, expense]
                category:
                  type: string
                transaction_date:
                  type: string
                  format: date
                note:
                  type: string
      responses:
        201:
          description: Record created

    get:
      summary: Get financial records
      tags: [Records]
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: type
          schema:
            type: string
            enum: [income, expense]
        - in: query
          name: category
          schema:
            type: string
        - in: query
          name: startDate
          schema:
            type: string
            format: date
        - in: query
          name: endDate
          schema:
            type: string
            format: date
      responses:
        200:
          description: Records fetched

  /api/records/{id}:
    patch:
      summary: Update record (Admin only)
      tags: [Records]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Record updated

    delete:
      summary: Delete record (Admin only)
      tags: [Records]
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
      responses:
        200:
          description: Record deleted

  /api/dashboard/summary:
    get:
      summary: Get dashboard summary
      tags: [Dashboard]
      security:
        - bearerAuth: []
      responses:
        200:
          description: Dashboard data
          content:
            application/json:
              example:
                totalIncome: 8200
                totalExpense: 4700
                netBalance: 3500
                categoryBreakdown:
                  - category: food
                    total: 1700